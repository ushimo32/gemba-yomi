name: weekly-gemba-yomi

# キーは明示的に文字列化(YAMLの on -> 真偽値 誤解釈を回避)
"on":
  # 手動実行(テスト用)
  workflow_dispatch:
  schedule:
    # 毎週金曜 11:00 UTC = 20:00 JST(金曜夜)
    - cron: "0 11 * * 5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run collector
        id: collect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/index.js

      - name: Commit drafts & state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts state
          if git diff --cached --quiet; then
            echo "変更なし — コミットしません"
          else
            git commit -m "chore: 週次下書き $(date -u +%Y-%m-%d)"
            git push
          fi

      # 完了通知メール(下書き生成時は目玉入り、新着0件時は「新着なし」)
      - name: Notify by email
        if: ${{ steps.collect.outputs.status != '' }}
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          STATUS: ${{ steps.collect.outputs.status }}
          DATE: ${{ steps.collect.outputs.date }}
          TOTAL: ${{ steps.collect.outputs.total }}
          DOMESTIC: ${{ steps.collect.outputs.domestic }}
          FOREIGN: ${{ steps.collect.outputs.foreign }}
          HIGH: ${{ steps.collect.outputs.high }}
          SKIPPED: ${{ steps.collect.outputs.skipped }}
          HIGH_TITLES: ${{ steps.collect.outputs.high_titles }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: python3 .github/scripts/notify.py
